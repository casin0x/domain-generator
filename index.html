  .filter-btn[data-filter="brandpick"] { border-color: #fdcb6e44; }

  .filter-btn[data-filter="dark"] { border-color: #636e7288; }
  .filter-btn[data-filter="dark"].active { background: #2d3436; border-color: #636e72; color: #dfe6e9; }
  .filter-btn[data-filter="action"] { border-color: #e74c3c44; }
  .filter-btn[data-filter="action"].active { background: #e74c3c; border-color: #e74c3c; color: #fff; }
  .filter-btn[data-filter="mylist"] { border-color: #6c5ce744; }
  .filter-btn[data-filter="mylist"].active { background: #6c5ce7; border-color: #6c5ce7; color: #fff; }
  .filter-btn[data-filter="brandpick"].active { background: #fdcb6e; border-color: #fdcb6e; color: #000; }
  .stats { display: flex; gap: 16px; margin-bottom: 20px; }
  .stat-card { background: #1a1a24; border: 1px solid #222; border-radius: 10px; padding: 14px 20px; min-width: 120px; }
  .stat-card .num { font-size: 28px; font-weight: 700; color: #fff; }
  .stat-card .label { font-size: 12px; color: #888; margin-top: 2px; }
  .stat-card.green .num { color: #00b894; }
  .stat-card.red .num { color: #e74c3c; }
  .stat-card.purple .num { color: #6c5ce7; }
  .stat-card.yellow .num { color: #fdcb6e; }
  table { width: 100%; border-collapse: collapse; }

  thead th.sortable { cursor: pointer; user-select: none; }
  thead th.sortable:hover { color: #6c5ce7; }
  thead th .arrow { margin-left: 4px; font-size: 10px; }
  tbody tr { border-bottom: 1px solid #1a1a24; transition: background 0.15s; }
  tbody tr:hover { background: #1a1a28; }

  td.taken-1 { }
  td.taken-2 { }
  td.taken-3 { }

  .badge-oneword { background: #00b89422; color: #55efc4; border: 1px solid #00b89444; }
  .badge-invented { background: #fd79a822; color: #fd79a8; border: 1px solid #fd79a844; }
  .cell-taken { color: #e74c3c; font-weight: 500; font-size: 13px; }
  .cell-price { color: #00b894; font-weight: 500; }
  .cell-price.premium { color: #fdcb6e; }
  .cell-price.expensive { color: #e17055; }
  .cell-unknown { color: #636e72; }
  .cell-estimate { color: #74b9ff; font-style: italic; }
  .taken-badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 12px; font-weight: 600; }

  #count { color: #888; font-size: 13px; margin-left: auto; }

<div class="list-panel" id="listPanel">

    <button class="btn-clear" onclick="clearList()">Clear</button>

</div>

let currentFilter = 'all';
let currentSort = { col: 'taken', dir: 'asc' };
let searchQuery = '';

// List management
let myList = JSON.parse(localStorage.getItem('domainList') || '[]');

function saveList() {
  localStorage.setItem('domainList', JSON.stringify(myList));
  renderList();
}

function toggleDomain(name) {
  const idx = myList.findIndex(item => item.name === name);
  if (idx >= 0) {
    myList.splice(idx, 1);
  } else {
    const d = DATA.find(x => x.name === name);
    if (d) myList.push({ name: d.name, com: d.com, io: d.io, bet: d.bet, game: d.game });
  }
  saveList();
  render();
}

function isInList(name) {
  return myList.some(item => item.name === name);
}

function renderList() {
  const body = document.getElementById('listBody');
  const count = myList.length;
  document.getElementById('listCount').textContent = count;
  document.getElementById('toggleCount').textContent = count;

  if (count === 0) {
    body.innerHTML = '<div style="text-align:center;color:#636e72;padding:40px 20px;font-size:13px;">Click rows in the table to add domains to your list</div>';
    return;
  }

  body.innerHTML = myList.map(item => {
    const tlds = ['.com','.io','.bet','.game'].filter(tld => {
      const val = item[tld.replace('.','')];
      return val && val !== 'TAKEN' && val !== '?';
    }).join(' ');
    return `<div class="list-item">
      <div><div class="li-name">${item.name}</div><div class="li-tlds">${tlds || 'check TLDs'}</div></div>
      <button class="li-remove" onclick="event.stopPropagation();toggleDomain('${item.name}')">&times;</button>
    </div>`;
  }).join('');
}

function togglePanel() {
  const panel = document.getElementById('listPanel');
  panel.classList.toggle('open');
  document.body.classList.toggle('panel-open');
}

function copyList() {
  const text = myList.map(item => {
    const tlds = ['.com','.io','.bet','.game'];
    const avail = tlds.filter(tld => {
      const val = item[tld.replace('.','')];
      return val && val !== 'TAKEN' && val !== '?';
    }).map(tld => item.name.toLowerCase() + tld);
    return avail.join('\n');
  }).join('\n');
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.btn-copy');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
}

function exportList() {
  let csv = 'Name,.com,.io,.bet,.game\n';
  myList.forEach(item => {
    csv += `${item.name},${item.com},${item.io},${item.bet},${item.game}\n`;
  });
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'my-domain-list.csv'; a.click();
  URL.revokeObjectURL(url);
}

function clearList() {
  if (confirm('Clear your entire list?')) {
    myList = [];
    saveList();
    render();
  }
}

function parsePriceNum(val) {
  if (!val || val === 'TAKEN' || val === '?') return Infinity;
  const clean = val.replace('~','').replace(' kr','').replace(/\./g,'').replace(',','.');
  return parseFloat(clean) || Infinity;
}

function formatCell(val) {
  if (val === 'TAKEN') return `<span class="cell-taken">TAKEN</span>`;
  if (val === '?') return `<span class="cell-unknown">?</span>`;
  if (val.startsWith('~')) return `<span class="cell-estimate">${val}</span>`;
  const num = parsePriceNum(val);
  if (num < 1000) return `<span class="cell-price">${val}</span>`;
  if (num < 50000) return `<span class="cell-price premium">${val}</span>`;
  return `<span class="cell-price expensive">${val}</span>`;
}

function render() {
  let filtered = DATA.filter(d => {
    if (searchQuery && !d.name.toLowerCase().includes(searchQuery)) return false;
    if (currentFilter === 'compound' && d.type !== 'Compound') return false;
    if (currentFilter === 'oneword' && d.type !== 'One-Word') return false;
    if (currentFilter === 'invented' && d.type !== 'Invented') return false;
    if (currentFilter === 'available' && d.com === 'TAKEN') return false;
    if (currentFilter === 'mylist' && !isInList(d.name)) return false;
    if (currentFilter === 'brandpick' && !CURATED.has(d.name)) return false;
    if (currentFilter === 'comfree' && !COM_FREE.has(d.name)) return false;
    if (currentFilter === 'short' && !SHORT_NAMES.has(d.name)) return false;
    if (currentFilter === 'animal' && !ANIMAL_NAMES.has(d.name)) return false;
    if (currentFilter === 'dark' && !DARK_NAMES.has(d.name)) return false;
    if (currentFilter === 'action' && !ACTION_NAMES.has(d.name)) return false;
    if (currentFilter === 'cheap') {
      const prices = [d.com, d.io, d.bet, d.game].map(parsePriceNum);
      if (Math.min(...prices) >= 1000) return false;
    }
    return true;
  });

  filtered.sort((a, b) => {
    let va, vb;
    const col = currentSort.col;
    if (col === 'name') { va = a.name; vb = b.name; }
    else if (col === 'taken') { va = a.taken; vb = b.taken; }
    else if (col === 'com') { va = parsePriceNum(a.com); vb = parsePriceNum(b.com); }
    else if (col === 'io') { va = parsePriceNum(a.io); vb = parsePriceNum(b.io); }
    else if (col === 'bet') { va = parsePriceNum(a.bet); vb = parsePriceNum(b.bet); }
    else if (col === 'game') { va = parsePriceNum(a.game); vb = parsePriceNum(b.game); }
    if (typeof va === 'string') {
      return currentSort.dir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
    }
    return currentSort.dir === 'asc' ? va - vb : vb - va;
  });

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = filtered.map(d => {
    const badgeClass = d.type === 'Compound' ? 'badge-compound' : d.type === 'Invented' ? 'badge-invented' : 'badge-oneword';
    const takenClass = `taken-${d.taken}`;
    const inList = isInList(d.name);
    const selectedClass = inList ? ' selected' : '';
    const btnClass = inList ? 'add-btn in-list' : 'add-btn';
    const btnText = inList ? 'Listed' : '+';
    return `<tr class="${selectedClass}" onclick="toggleDomain('${d.name}')">
      <td class="name">${d.name} <button class="${btnClass}" onclick="event.stopPropagation();toggleDomain('${d.name}')">${btnText}</button></td>
      <td><span class="taken-badge ${takenClass}">${d.taken}/4</span></td>
      <td>${formatCell(d.com)}</td>
      <td>${formatCell(d.io)}</td>
      <td>${formatCell(d.bet)}</td>
      <td>${formatCell(d.game)}</td>
      <td><span class="badge ${badgeClass}">${d.type}</span></td>
    </tr>`;
  }).join('');

  document.getElementById('count').textContent = `${filtered.length} of ${DATA.length} names`;

  // Stats
  const allAvail = DATA.reduce((n, d) => n + [d.com,d.io,d.bet,d.game].filter(v => v !== 'TAKEN' && v !== '?').length, 0);
  const allTaken = DATA.reduce((n, d) => n + [d.com,d.io,d.bet,d.game].filter(v => v === 'TAKEN').length, 0);
  const cheapCount = DATA.filter(d => [d.com,d.io,d.bet,d.game].some(v => parsePriceNum(v) < 1000)).length;
  document.getElementById('stats').innerHTML = `
    <div class="stat-card purple"><div class="num">${DATA.length}</div><div class="label">Names</div></div>
    <div class="stat-card green"><div class="num">${allAvail}</div><div class="label">Available domains</div></div>
    <div class="stat-card red"><div class="num">${allTaken}</div><div class="label">Taken domains</div></div>
    <div class="stat-card yellow"><div class="num">${cheapCount}</div><div class="label">Names with &lt;1000 kr option</div></div>
  `;
}

document.getElementById('search').addEventListener('input', e => { searchQuery = e.target.value.toLowerCase(); render(); });

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

document.querySelectorAll('th.sortable').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (currentSort.col === col) currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
    else { currentSort.col = col; currentSort.dir = 'asc'; }
    document.querySelectorAll('th .arrow').forEach(a => a.textContent = '');
    th.querySelector('.arrow').textContent = currentSort.dir === 'asc' ? ' ▲' : ' ▼';
    render();
  });
});

render();
renderList();
</script>
</body>
</html>
