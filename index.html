<script>
// ===== AUTH =====
const USERS = {
  'Admino': { pw: 'Admino', avatar: 'A' },
  'MrFrog': { pw: 'MrFrog', avatar: 'F' }
};

function doLogin() {
  const user = document.getElementById('loginUser').value;
  const pass = document.getElementById('loginPass').value;
  const err = document.getElementById('loginError');
  if (USERS[user] && USERS[user].pw === pass) {
    err.style.display = 'none';
    sessionStorage.setItem('currentUser', user);
    showApp(user);
  } else {
    err.style.display = 'block';
  }
}

function doLogout() {
  sessionStorage.removeItem('currentUser');
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginOverlay').classList.remove('hidden');
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
}

function showApp(user) {
  document.getElementById('loginOverlay').classList.add('hidden');
  document.getElementById('app').style.display = 'block';
  document.getElementById('userName').textContent = user;
  document.getElementById('userAvatar').textContent = USERS[user].avatar;
}

// Enter key on password field
document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('loginUser').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('loginPass').focus(); });

// Auto-login if session exists
const savedUser = sessionStorage.getItem('currentUser');
if (savedUser && USERS[savedUser]) {
  showApp(savedUser);
} else {
  document.getElementById('loginOverlay').classList.remove('hidden');
}
</script>

    body.innerHTML = '<div style="text-align:center;color:#636e72;padding:40px 20px;font-size:13px;">Click rows in the table to add domains to your list</div>';
    return;
  }

  body.innerHTML = myList.map(item => {
    const tlds = ['.com','.io','.bet','.game'].filter(tld => {
      const val = item[tld.replace('.','')];
      return val && val !== 'TAKEN' && val !== '?';
    }).join(' ');
    return `<div class="list-item">
      <div><div class="li-name">${item.name}</div><div class="li-tlds">${tlds || 'check TLDs'}</div></div>
      <button class="li-remove" onclick="event.stopPropagation();toggleDomain('${item.name}')">&times;</button>
    </div>`;
  }).join('');
}

function togglePanel() {
  const panel = document.getElementById('listPanel');
  panel.classList.toggle('open');
  document.body.classList.toggle('panel-open');
}

function copyList() {
  const text = myList.map(item => {
    const tlds = ['.com','.io','.bet','.game'];
    const avail = tlds.filter(tld => {
      const val = item[tld.replace('.','')];
      return val && val !== 'TAKEN' && val !== '?';
    }).map(tld => item.name.toLowerCase() + tld);
    return avail.join('\n');
  }).join('\n');
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.btn-copy');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
}

function exportList() {
  let csv = 'Name,.com,.io,.bet,.game\n';
  myList.forEach(item => {
    csv += `${item.name},${item.com},${item.io},${item.bet},${item.game}\n`;
  });
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'my-domain-list.csv'; a.click();
  URL.revokeObjectURL(url);
}

function clearList() {
  if (confirm('Clear your entire list?')) {
    myList = [];
    saveList();
    render();
  }
}

function parsePriceNum(val) {
  if (!val || val === 'TAKEN' || val === '?') return Infinity;
  const clean = val.replace('~','').replace(' kr','').replace(/\./g,'').replace(',','.');
  return parseFloat(clean) || Infinity;
}

function formatCell(val) {
  if (val === 'TAKEN') return `<span class="cell-taken">TAKEN</span>`;
  if (val === 'Available') return `<span class="cell-price">Available</span>`;
  if (val === '?') return `<span class="cell-unknown">?</span>`;
  if (val.startsWith('~')) return `<span class="cell-estimate">${val}</span>`;
  const num = parsePriceNum(val);
  if (num < 1000) return `<span class="cell-price">${val}</span>`;
  if (num < 50000) return `<span class="cell-price premium">${val}</span>`;
  return `<span class="cell-price expensive">${val}</span>`;
}

function render() {
  let filtered = DATA.filter(d => {
    if (searchQuery && !d.name.toLowerCase().includes(searchQuery)) return false;
    if (currentFilter === 'compound' && d.type !== 'Compound') return false;
    if (currentFilter === 'oneword' && d.type !== 'One-Word') return false;
    if (currentFilter === 'invented' && d.type !== 'Invented') return false;
    if (currentFilter === 'available' && d.com === 'TAKEN') return false;
    if (currentFilter === 'mylist' && !isInList(d.name)) return false;
    if (currentFilter === 'brandpick' && !CURATED.has(d.name)) return false;
    if (currentFilter === 'comfree' && !COM_FREE.has(d.name)) return false;
    if (currentFilter === 'short' && !SHORT_NAMES.has(d.name)) return false;
    if (currentFilter === 'animal' && !ANIMAL_NAMES.has(d.name)) return false;
    if (currentFilter === 'dark' && !DARK_NAMES.has(d.name)) return false;
    if (currentFilter === 'action' && !ACTION_NAMES.has(d.name)) return false;
    if (currentFilter === 'new' && !NEW_NAMES.has(d.name)) return false;
    if (currentFilter === 'manual' && d.type !== 'Manual') return false;
    if (currentFilter === 'play' && d.type !== 'Play') return false;
    if (currentFilter === 'cheap') {
      const prices = [d.com, d.io, d.bet, d.game].map(parsePriceNum);
      if (Math.min(...prices) >= 1000) return false;
    }
    return true;
  });

  filtered.sort((a, b) => {
    let va, vb;
    const col = currentSort.col;
    if (col === 'name') { va = a.name; vb = b.name; }
    else if (col === 'taken') { va = a.taken; vb = b.taken; }
    else if (col === 'com') { va = parsePriceNum(a.com); vb = parsePriceNum(b.com); }
    else if (col === 'io') { va = parsePriceNum(a.io); vb = parsePriceNum(b.io); }
    else if (col === 'bet') { va = parsePriceNum(a.bet); vb = parsePriceNum(b.bet); }
    else if (col === 'game') { va = parsePriceNum(a.game); vb = parsePriceNum(b.game); }
    if (typeof va === 'string') {
      return currentSort.dir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
    }
    return currentSort.dir === 'asc' ? va - vb : vb - va;
  });

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = filtered.map(d => {
    const badgeClass = d.type === 'Compound' ? 'badge-compound' : d.type === 'Invented' ? 'badge-invented' : d.type === 'New' ? 'badge-new' : d.type === 'Play' ? 'badge-play' : d.type === 'Manual' ? 'badge-manual' : 'badge-oneword';
    const takenClass = `taken-${d.taken}`;
    const inList = isInList(d.name);
    const selectedClass = inList ? ' selected' : '';
    const btnClass = inList ? 'add-btn in-list' : 'add-btn';
    const btnText = inList ? 'Listed' : '+';
    return `<tr class="${selectedClass}" onclick="toggleDomain('${d.name}')">
      <td class="name">${d.name} <button class="${btnClass}" onclick="event.stopPropagation();toggleDomain('${d.name}')">${btnText}</button></td>
      <td><span class="taken-badge ${takenClass}">${d.taken}/4</span></td>
      <td>${formatCell(d.com)}</td>
      <td>${formatCell(d.io)}</td>
      <td>${formatCell(d.bet)}</td>
      <td>${formatCell(d.game)}</td>
      <td><span class="badge ${badgeClass}">${d.type}</span></td>
    </tr>`;
  }).join('');

  document.getElementById('count').textContent = `${filtered.length} of ${DATA.length} names`;

  // Stats
  const allAvail = DATA.reduce((n, d) => n + [d.com,d.io,d.bet,d.game].filter(v => v !== 'TAKEN' && v !== '?').length, 0);
  const allTaken = DATA.reduce((n, d) => n + [d.com,d.io,d.bet,d.game].filter(v => v === 'TAKEN').length, 0);
  const cheapCount = DATA.filter(d => [d.com,d.io,d.bet,d.game].some(v => parsePriceNum(v) < 1000)).length;
  document.getElementById('stats').innerHTML = `
    <div class="stat-card purple"><div class="num">${DATA.length}</div><div class="label">Names</div></div>
    <div class="stat-card green"><div class="num">${allAvail}</div><div class="label">Available domains</div></div>
    <div class="stat-card red"><div class="num">${allTaken}</div><div class="label">Taken domains</div></div>
    <div class="stat-card yellow"><div class="num">${cheapCount}</div><div class="label">Names with &lt;1000 kr option</div></div>
  `;
}

document.getElementById('search').addEventListener('input', e => { searchQuery = e.target.value.toLowerCase(); render(); });

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

document.querySelectorAll('th.sortable').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (currentSort.col === col) currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
    else { currentSort.col = col; currentSort.dir = 'asc'; }
    document.querySelectorAll('th .arrow').forEach(a => a.textContent = '');
    th.querySelector('.arrow').textContent = currentSort.dir === 'asc' ? ' ▲' : ' ▼';
    render();
  });
});

// Manual domain entry — check via DNS over HTTPS (Cloudflare DoH)
// NXDOMAIN (Status 3) = available, has records = taken
async function checkDomainDNS(domain) {
  try {
    const resp = await fetch(`https://cloudflare-dns.com/dns-query?name=${domain}&type=NS`, {
      headers: { 'Accept': 'application/dns-json' }
    });
    const data = await resp.json();
    // Status 3 = NXDOMAIN (not registered), 0 = found
    if (data.Status === 3) return 'Available';
    if (data.Status === 0 && data.Answer && data.Answer.length > 0) return 'Taken';
    // Status 0 but no answer — could be registered with no NS, check A record
    const respA = await fetch(`https://cloudflare-dns.com/dns-query?name=${domain}&type=A`, {
      headers: { 'Accept': 'application/dns-json' }
    });
    const dataA = await respA.json();
    if (dataA.Status === 3) return 'Available';
    if (dataA.Status === 0 && dataA.Answer && dataA.Answer.length > 0) return 'Taken';
    // Ambiguous — mark as unknown
    return '?';
  } catch (e) {
    return '?';
  }
}

// Load saved manual domains from localStorage
function loadManualDomains() {
  try {
    const saved = JSON.parse(localStorage.getItem('manualDomains') || '[]');
    const existing = new Set(DATA.map(d => d.name.toLowerCase()));
    saved.forEach(d => {
      if (!existing.has(d.name.toLowerCase())) {
        DATA.push(d);
        existing.add(d.name.toLowerCase());
      }
    });
  } catch(e) {}
}

function saveManualDomains() {
  const manuals = DATA.filter(d => d.type === 'Manual');
  localStorage.setItem('manualDomains', JSON.stringify(manuals));
}

async function addManualDomain() {
  const input = document.getElementById('manualInput');
  const btn = document.getElementById('manualBtn');
  const status = document.getElementById('manualStatus');
  let name = input.value.trim().replace(/\s+/g, '').replace(/\..+$/, '');
  if (!name) return;
  // Capitalize first letter
  name = name.charAt(0).toUpperCase() + name.slice(1).toLowerCase();

  // Check if already exists
  if (DATA.find(d => d.name.toLowerCase() === name.toLowerCase())) {
    status.className = 'status error';
    status.textContent = `"${name}" already in the list`;
    return;
  }

  btn.disabled = true;
  status.className = 'status checking';
  status.textContent = `Checking ${name} across 4 TLDs...`;

  const tlds = ['com', 'io', 'bet', 'game'];
  const results = {};
  for (const tld of tlds) {
    status.textContent = `Checking ${name}.${tld}...`;
    results[tld] = await checkDomainDNS(`${name.toLowerCase()}.${tld}`);
    // Small delay between checks
    await new Promise(r => setTimeout(r, 200));
  }

  const taken = Object.values(results).filter(v => v === 'Taken').length;
  const entry = { name, taken, com: results.com, io: results.io, bet: results.bet, game: results.game, type: 'Manual' };
  DATA.push(entry);
  saveManualDomains();

  const availCount = Object.values(results).filter(v => v === 'Available').length;
  status.className = 'status done';
  status.textContent = `Added "${name}" — ${availCount}/4 TLDs available`;
  input.value = '';
  btn.disabled = false;

  // Switch to manual filter and render
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-filter="manual"]').classList.add('active');
  currentFilter = 'manual';
  render();
}

// Enter key triggers add
document.getElementById('manualInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addManualDomain();
});

// Recheck functions — re-verify domain availability via DNS
async function recheckDomains(domains) {
  const statusEl = document.getElementById('recheckStatus');
  const btns = document.querySelectorAll('.recheck-bar button');
  btns.forEach(b => b.disabled = true);

  let checked = 0;
  let changed = 0;
  const total = domains.length;
  const tlds = ['com', 'io', 'bet', 'game'];

  for (const d of domains) {
    checked++;
    statusEl.className = 'status';
    statusEl.style.color = '#fdcb6e';
    statusEl.textContent = `Checking ${d.name} (${checked}/${total})...`;

    for (const tld of tlds) {
      const result = await checkDomainDNS(`${d.name.toLowerCase()}.${tld}`);
      if (result !== '?' && d[tld] !== result) {
        const old = d[tld];
        d[tld] = result;
        changed++;
        console.log(`${d.name}.${tld}: ${old} → ${result}`);
      }
      await new Promise(r => setTimeout(r, 150));
    }
    d.taken = tlds.filter(t => d[t] === 'Taken').length;
    render();
  }

  // Update manual domains in localStorage if any were manual
  saveManualDomains();

  statusEl.style.color = '#00b894';
  statusEl.textContent = `Done — ${checked} names rechecked, ${changed} changes found`;
  btns.forEach(b => b.disabled = false);
}

async function recheckFiltered() {
  // Get currently filtered/visible domains
  let filtered = DATA.filter(d => {
    if (searchQuery && !d.name.toLowerCase().includes(searchQuery)) return false;
    if (currentFilter === 'compound' && d.type !== 'Compound') return false;
    if (currentFilter === 'oneword' && d.type !== 'One-Word') return false;
    if (currentFilter === 'invented' && d.type !== 'Invented') return false;
    if (currentFilter === 'available' && d.com === 'TAKEN') return false;
    if (currentFilter === 'mylist' && !isInList(d.name)) return false;
    if (currentFilter === 'brandpick' && !CURATED.has(d.name)) return false;
    if (currentFilter === 'comfree' && !COM_FREE.has(d.name)) return false;
    if (currentFilter === 'short' && !SHORT_NAMES.has(d.name)) return false;
    if (currentFilter === 'animal' && !ANIMAL_NAMES.has(d.name)) return false;
    if (currentFilter === 'dark' && !DARK_NAMES.has(d.name)) return false;
    if (currentFilter === 'action' && !ACTION_NAMES.has(d.name)) return false;
    if (currentFilter === 'new' && !NEW_NAMES.has(d.name)) return false;
    if (currentFilter === 'manual' && d.type !== 'Manual') return false;
    if (currentFilter === 'play' && d.type !== 'Play') return false;
    return true;
  });

  if (filtered.length > 200) {
    if (!confirm(`This will recheck ${filtered.length} domains (${filtered.length * 4} lookups). Continue?`)) return;
  }
  await recheckDomains(filtered);
}

async function recheckMyList() {
  const listDomains = DATA.filter(d => isInList(d.name));
  if (listDomains.length === 0) {
    document.getElementById('recheckStatus').textContent = 'Your list is empty';
    return;
  }
  await recheckDomains(listDomains);
}

loadManualDomains();
render();
renderList();
</script>
